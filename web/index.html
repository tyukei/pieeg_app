<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiEEG モニタ</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header>
      <h1>PiEEG-16 リアルタイムモニタ</h1>
      <div class="controls">
        <span class="dot off" id="status-dot"></span>
        <span id="status">初期化中…</span>
        <select id="mode" title="データ源">
          <option value="simulator">シミュレータ（ブラウザ内）</option>
          <option value="server">サーバー接続</option>
        </select>
        <input
          id="server-url"
          type="text"
          value="ws://localhost:8000/ws"
          size="28"
          disabled
        />
        <button id="apply">適用</button>
      </div>
    </header>

    <main>
      <section class="card">
        <h2>波形 (16ch, μV)</h2>
        <canvas id="wave"></canvas>
      </section>

      <section class="card">
        <h2>バンドパワー (全ch平均)</h2>
        <canvas id="bands"></canvas>
        <div id="band-values" class="band-values"></div>
      </section>
    </main>

    <footer>
      <span id="meta"></span>
      <span class="hint">
        実機は <code>--source hardware</code> の acquirer と server を起動し、上で
        「サーバー接続」を選択。
      </span>
    </footer>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
